###############################################
# General
logLevel: info
logDestinations: [stdout]
api: no

###############################################
# RTMP - ingest (people push here)
rtmp: yes
rtmpAddress: :1935

###############################################
# HLS - output (your phone pulls here)
hls: yes
hlsAddress: :8080
hlsAllowOrigins: ['*']

# mpegts = maximum compatibility (works with VLC, ExoPlayer, browsers)
# lowLatency (LL-HLS) often breaks behind generic HTTP proxies like Railway's,
# because it relies on blocking requests that proxies may buffer/timeout.
hlsVariant: mpegts

# Generate HLS continuously so the playlist is ready immediately,
# instead of waiting for the first request (avoids 404 race on app poll).
hlsAlwaysRemux: yes

hlsSegmentCount: 5
hlsSegmentDuration: 2s

###############################################
# Disable unused protocols
rtsp: no
webrtc: no
srt: no

###############################################
# Paths
paths:
  all_others:
    source: publisher
