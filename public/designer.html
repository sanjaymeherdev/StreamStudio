<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Overlay Designer - StreamStudio</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0A0D14;
            color: #DCE6F8;
            height: 100vh;
            overflow: hidden;
        }
        
        .app {
            display: flex;
            height: 100vh;
        }
        
        /* Left Panel */
        .panel {
            width: 320px;
            background: #0F1420;
            border-right: 1px solid #1F2A3E;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            flex-shrink: 0;
        }
        
        .panel-header {
            padding: 16px;
            border-bottom: 1px solid #1F2A3E;
            background: #141A28;
        }
        
        .panel-header h1 {
            font-size: 16px;
            font-family: 'Space Mono', monospace;
            color: #4DFFA0;
            margin-bottom: 8px;
        }
        
        .panel-header input, .panel-header textarea {
            width: 100%;
            padding: 8px 12px;
            background: #1A2232;
            border: 1px solid #1F2A3E;
            color: #DCE6F8;
            border-radius: 6px;
            font-size: 12px;
            margin-top: 6px;
        }
        
        .panel-header textarea {
            resize: vertical;
            min-height: 50px;
        }
        
        /* Toolbar */
        .toolbar {
            padding: 12px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            border-bottom: 1px solid #1F2A3E;
            background: #0F1420;
        }
        
        .tool-btn {
            padding: 8px 12px;
            background: #1A2232;
            border: 1px solid #1F2A3E;
            color: #DCE6F8;
            border-radius: 6px;
            cursor: pointer;
            font-size: 11px;
            font-family: 'Space Mono', monospace;
            transition: all 0.2s;
        }
        
        .tool-btn:hover {
            background: #4DFFA0;
            color: #0A0D14;
            border-color: #4DFFA0;
        }
        
        .tool-btn.active {
            background: #4DFFA0;
            color: #0A0D14;
            border-color: #4DFFA0;
        }
        
        .tool-btn.danger {
            color: #ef4444;
            border-color: #ef4444;
        }
        
        .tool-btn.danger:hover {
            background: #ef4444;
            color: white;
        }
        
        .tool-btn.primary {
            background: #4D9FFF;
            color: white;
            border-color: #4D9FFF;
        }
        
        .tool-btn.success {
            background: #4DFFA0;
            color: #0A0D14;
            border-color: #4DFFA0;
        }
        
        /* Elements Section */
        .elements-section {
            flex: 3;
            overflow-y: auto;
            padding: 12px;
            min-height: 300px;
        }
        
        .section-title {
            font-size: 10px;
            font-family: 'Space Mono', monospace;
            color: #6A7A9A;
            letter-spacing: 1px;
            margin-bottom: 10px;
            text-transform: uppercase;
        }
        
        .elements-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 20px;
        }
        
        .element-item {
            background: #1A2232;
            border: 1px solid #1F2A3E;
            border-radius: 8px;
            padding: 10px;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }
        
        .element-item:hover {
            border-color: #4DFFA0;
            transform: translateX(4px);
        }
        
        .element-item.selected {
            border-color: #4DFFA0;
            background: #1F2A3E;
        }
        
        .element-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
        }
        
        .element-icon {
            font-size: 20px;
        }
        
        .element-name {
            flex: 1;
            font-size: 12px;
            font-weight: 600;
        }
        
        .element-delete {
            background: none;
            border: none;
            color: #6A7A9A;
            cursor: pointer;
            font-size: 14px;
            padding: 4px;
        }
        
        .element-delete:hover {
            color: #ef4444;
        }
        
        .element-preview {
            font-size: 10px;
            color: #6A7A9A;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        
        .empty-state {
            text-align: center;
            color: #6A7A9A;
            padding: 40px 20px;
            font-size: 12px;
        }
        
        /* Properties Panel */
        .properties-panel {
            padding: 12px;
            border-top: 1px solid #1F2A3E;
            background: #0F1420;
            display: none;
            max-height: 40%;
            overflow-y: auto;
        }
        
        .properties-panel.show {
            display: block;
        }
        
        .prop-group {
            margin-bottom: 12px;
        }
        
        .prop-label {
            font-size: 9px;
            font-family: 'Space Mono', monospace;
            color: #6A7A9A;
            margin-bottom: 4px;
            display: block;
            text-transform: uppercase;
        }
        
        .prop-input, .prop-select {
            width: 100%;
            padding: 6px 10px;
            background: #1A2232;
            border: 1px solid #1F2A3E;
            color: #DCE6F8;
            border-radius: 4px;
            font-size: 11px;
        }
        
        .prop-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }
        
        .color-input {
            width: 100%;
            height: 32px;
            padding: 2px;
            border-radius: 4px;
            border: 1px solid #1F2A3E;
            cursor: pointer;
            background: #1A2232;
        }
        
        /* Canvas Area */
        .canvas-area {
            flex: 1;
            background: #07090F;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: auto;
            position: relative;
        }
        
        .canvas-wrapper {
            position: relative;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }
        
        #canvas {
            position: relative;
            width: 1080px;
            height: 1920px;
            background: transparent;
            overflow: hidden;
            transform-origin: top left;
            cursor: crosshair;
        }
        
        /* Checkerboard pattern for transparent background */
        #canvas::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image: 
                linear-gradient(45deg, #1a1a2e 25%, transparent 25%),
                linear-gradient(-45deg, #1a1a2e 25%, transparent 25%),
                linear-gradient(45deg, transparent 75%, #1a1a2e 75%),
                linear-gradient(-45deg, transparent 75%, #1a1a2e 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
            opacity: 0.3;
            pointer-events: none;
            z-index: 0;
        }
        
        .canvas-layer {
            position: absolute;
            inset: 0;
            pointer-events: none;
        }
        
        #layer-shapes, #layer-images, #layer-text, #layer-social {
            pointer-events: auto;
        }
        
        /* Transform Controls */
        #transform-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10000;
        }
        
        .transform-box {
            position: absolute;
            border: 2px solid #4DFFA0;
            background: rgba(77, 255, 160, 0.05);
            box-sizing: border-box;
            pointer-events: none;
        }
        
        .transform-handle {
            position: absolute;
            width: 12px;
            height: 12px;
            background: #4DFFA0;
            border: 2px solid #0A0D14;
            border-radius: 50%;
            pointer-events: auto;
            cursor: pointer;
            z-index: 10001;
        }
        
        .transform-handle:hover {
            transform: scale(1.3);
            background: #4D9FFF;
        }
        
        .transform-rotate {
            position: absolute;
            width: 24px;
            height: 24px;
            background: #4D9FFF;
            border: 2px solid #0A0D14;
            border-radius: 50%;
            pointer-events: auto;
            cursor: grab;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            z-index: 10001;
        }
        
        .transform-rotate:active {
            cursor: grabbing;
        }
        
        .transform-delete {
            position: absolute;
            width: 24px;
            height: 24px;
            background: #ef4444;
            border: 2px solid #0A0D14;
            border-radius: 50%;
            pointer-events: auto;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: white;
            font-weight: bold;
            z-index: 10001;
        }
        
        /* Modal */
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 20000;
        }
        
        .modal.show {
            display: flex;
        }
        
        .modal-content {
            background: #0F1420;
            border: 1px solid #1F2A3E;
            border-radius: 12px;
            width: 500px;
            max-width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }
        
        .modal-header {
            padding: 16px;
            border-bottom: 1px solid #1F2A3E;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .modal-body {
            padding: 16px;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }
        
        .element-option {
            background: #1A2232;
            border: 1px solid #1F2A3E;
            border-radius: 8px;
            padding: 16px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .element-option:hover {
            border-color: #4DFFA0;
            transform: translateY(-2px);
        }
        
        .element-option .emoji {
            font-size: 32px;
            margin-bottom: 8px;
        }
        
        .element-option .name {
            font-size: 12px;
            font-weight: 600;
        }
        
        /* Bottom Bar */
        .bottom-bar {
            position: fixed;
            bottom: 20px;
            right: 20px;
            display: flex;
            gap: 10px;
            z-index: 1000;
        }
        
        .save-btn {
            padding: 12px 24px;
            background: #4DFFA0;
            border: none;
            border-radius: 40px;
            color: #0A0D14;
            font-weight: bold;
            font-family: 'Space Mono', monospace;
            cursor: pointer;
            font-size: 14px;
            box-shadow: 0 4px 15px rgba(77,255,160,0.3);
            transition: transform 0.2s;
        }
        
        .save-btn:hover {
            transform: scale(1.05);
        }
        
        .new-btn {
            background: #4D9FFF;
            box-shadow: 0 4px 15px rgba(77,159,255,0.3);
        }
        
        .toast {
            position: fixed;
            bottom: 100px;
            right: 20px;
            background: #4DFFA0;
            color: #0A0D14;
            padding: 12px 20px;
            border-radius: 8px;
            font-family: 'Space Mono', monospace;
            font-size: 12px;
            z-index: 1000;
            display: none;
            animation: slideIn 0.3s ease;
            max-width: 400px;
            white-space: pre-wrap;
        }
        
        .toast.error {
            background: #ef4444;
            color: white;
        }
        
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        
        ::-webkit-scrollbar-track {
            background: #1A2232;
        }
        
        ::-webkit-scrollbar-thumb {
            background: #4DFFA0;
            border-radius: 3px;
        }
        
        /* Draggable elements */
        .draggable-element {
            position: absolute;
            cursor: move;
            user-select: none;
        }
        
        .draggable-element:hover {
            outline: 2px solid rgba(77,255,160,0.5);
            outline-offset: 2px;
        }
    </style>
</head>
<body>

<div class="app">
    <!-- Left Panel -->
    <div class="panel">
        <div class="panel-header">
            <h1>🎨 Overlay Designer</h1>
            <input type="text" id="designName" placeholder="Design Name (e.g., 'Lower Third - Green')">
            <textarea id="designDesc" placeholder="Description (optional)"></textarea>
        </div>
        
        <div class="toolbar">
            <button class="tool-btn" onclick="openAddModal()">+ Add Element</button>
            <button class="tool-btn danger" id="clearCanvasBtn">🗑 Clear All</button>
            <button class="tool-btn success" id="newDesignBtn">✨ New Design</button>
        </div>
        
        <div class="elements-section">
            <div class="section-title">📦 Elements</div>
            <div id="elementsList" class="elements-list">
                <div class="empty-state">✨ Click "New Design" to start<br>or press "Add Element"</div>
            </div>
        </div>
        
        <div id="propertiesPanel" class="properties-panel">
            <div class="section-title">⚙️ Properties</div>
            <div id="propertiesContent"></div>
        </div>
    </div>
    
    <!-- Canvas Area -->
    <div class="canvas-area">
        <div class="canvas-wrapper" id="canvasWrapper">
            <div id="canvas">
                <div id="layer-shapes" class="canvas-layer"></div>
                <div id="layer-images" class="canvas-layer"></div>
                <div id="layer-text" class="canvas-layer"></div>
                <div id="layer-social" class="canvas-layer"></div>
                <div id="transform-container"></div>
            </div>
        </div>
    </div>
</div>

<!-- Bottom Bar -->
<div class="bottom-bar">
    <button class="save-btn new-btn" id="newDesignBtn2">✨ New Design</button>
    <button class="save-btn" id="saveDesignBtn">💾 Save Overlay</button>
</div>

<div id="toast" class="toast"></div>

<!-- Add Element Modal -->
<div id="addModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3>Add Element</h3>
            <button onclick="closeAddModal()" style="background:none;border:none;color:white;font-size:20px;cursor:pointer;">✕</button>
        </div>
        <div class="modal-body">
            <div class="element-option" onclick="addShapeMenu()">
                <div class="emoji">🔷</div>
                <div class="name">Shape</div>
            </div>
            <div class="element-option" onclick="addElement('image')">
                <div class="emoji">🖼️</div>
                <div class="name">Image</div>
            </div>
            <div class="element-option" onclick="addElement('gif')">
                <div class="emoji">🎬</div>
                <div class="name">GIF</div>
            </div>
            <div class="element-option" onclick="addElement('video')">
                <div class="emoji">📹</div>
                <div class="name">Video</div>
            </div>
            <div class="element-option" onclick="addElement('text')">
                <div class="emoji">📝</div>
                <div class="name">Text</div>
            </div>
            <div class="element-option" onclick="addElement('social')">
                <div class="emoji">💬</div>
                <div class="name">Social Badge</div>
            </div>
        </div>
    </div>
</div>

<!-- Shape Modal -->
<div id="shapeModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3>Add Shape</h3>
            <button onclick="closeShapeModal()" style="background:none;border:none;color:white;font-size:20px;cursor:pointer;">✕</button>
        </div>
        <div class="modal-body">
            <div class="element-option" onclick="addShape('rectangle')">
                <div class="emoji">📐</div>
                <div class="name">Rectangle</div>
                <div style="font-size:10px;color:#6A7A9A;">Customizable corner radius</div>
            </div>
            <div class="element-option" onclick="addShape('circle')">
                <div class="emoji">⚪</div>
                <div class="name">Circle</div>
            </div>
            <div class="element-option" onclick="addShape('line')">
                <div class="emoji">━━</div>
                <div class="name">Line</div>
            </div>
        </div>
    </div>
</div>

<!-- Overwrite Confirmation Modal -->
<div id="overwriteModal" class="modal">
    <div class="modal-content" style="width:400px;">
        <div class="modal-header">
            <h3>⚠️ Design Exists</h3>
            <button onclick="closeOverwriteModal()" style="background:none;border:none;color:white;font-size:20px;cursor:pointer;">✕</button>
        </div>
        <div class="modal-body" style="display:block;">
            <p id="overwriteMessage" style="margin-bottom:20px;">A design with this name already exists.</p>
            <div style="display:flex;gap:10px;">
                <button class="tool-btn" style="flex:1;" onclick="closeOverwriteModal()">Cancel</button>
                <button class="tool-btn success" style="flex:1;" id="confirmOverwriteBtn">Overwrite</button>
            </div>
        </div>
    </div>
</div>

<script>
    // ============================================
    // STATE MANAGEMENT
    // ============================================
    
    let state = {
        name: '',
        description: '',
        elements: [],
        nextId: 1,
        existingDesignId: null  // For overwrite
    };
    
    let selectedElementId = null;
    let isDragging = false;
    let isRotating = false;
    let isResizing = false;
    let dragStart = { x: 0, y: 0 };
    let elementStart = { x: 0, y: 0, width: 0, height: 0, rotation: 0 };
    let resizeCorner = null;
    
    const CANVAS_W = 1080;
    const CANVAS_H = 1920;
    
    // ============================================
    // ELEMENT TEMPLATES
    // ============================================
    
    const templates = {
        rectangle: {
            type: 'shape',
            shapeType: 'rectangle',
            width: 150,
            height: 100,
            borderRadius: 0,
            color: '#4DFFA0',
            x: CANVAS_W / 2 - 75,
            y: CANVAS_H / 2 - 50,
            zIndex: 10,
            opacity: 100,
            animation: 'none',
            animationDuration: 0.5,
            rotation: 0
        },
        circle: {
            type: 'shape',
            shapeType: 'circle',
            size: 80,
            color: '#4D9FFF',
            x: CANVAS_W / 2 - 40,
            y: CANVAS_H / 2 - 40,
            zIndex: 10,
            opacity: 100,
            animation: 'none',
            rotation: 0
        },
        line: {
            type: 'shape',
            shapeType: 'line',
            width: 150,
            thickness: 3,
            color: '#FFFFFF',
            x: CANVAS_W / 2 - 75,
            y: CANVAS_H / 2,
            rotation: 0,
            zIndex: 10,
            opacity: 100
        },
        image: {
            type: 'image',
            src: 'https://placehold.co/400x300/4DFFA0/0A0D14?text=Image',
            width: 200,
            height: 'auto',
            borderRadius: 0,
            objectFit: 'contain',
            x: CANVAS_W / 2 - 100,
            y: CANVAS_H / 2 - 150,
            zIndex: 10,
            opacity: 100,
            animation: 'none'
        },
        gif: {
            type: 'gif',
            src: 'https://media.giphy.com/media/3o7abB06u9bNzA8LC8/giphy.gif',
            width: 200,
            height: 'auto',
            objectFit: 'contain',
            x: CANVAS_W / 2 - 100,
            y: CANVAS_H / 2 - 150,
            zIndex: 10,
            opacity: 100,
            loop: true
        },
        video: {
            type: 'video',
            src: 'https://www.w3schools.com/html/mov_bbb.mp4',
            width: 320,
            height: 180,
            borderRadius: 0,
            objectFit: 'cover',
            x: CANVAS_W / 2 - 160,
            y: CANVAS_H / 2 - 90,
            zIndex: 10,
            opacity: 100,
            loop: true
        },
        text: {
            type: 'text',
            content: 'New Text',
            fontSize: 36,
            fontWeight: 'bold',
            color: '#FFFFFF',
            fontFamily: 'DM Sans, sans-serif',
            textAlign: 'center',
            textShadow: 'none',
            bgColor: 'transparent',
            padding: 0,
            borderRadius: 0,
            maxWidth: 400,
            x: CANVAS_W / 2 - 200,
            y: CANVAS_H / 2 - 18,
            zIndex: 10,
            opacity: 100,
            animation: 'none'
        },
        social: {
            type: 'social',
            platform: 'youtube',
            username: 'streamstudio',
            showLiveBadge: true,
            bgColor: 'rgba(0,0,0,0.7)',
            textColor: '#FFFFFF',
            fontSize: 14,
            fontWeight: 'bold',
            iconSize: 24,
            padding: '8px 16px',
            borderRadius: 50,
            x: CANVAS_W / 2 - 100,
            y: CANVAS_H - 100,
            zIndex: 10,
            opacity: 100,
            animation: 'none'
        }
    };
    
    // ============================================
    // RENDER FUNCTIONS
    // ============================================
    
    function renderCanvas() {
        // Clear layers
        document.getElementById('layer-shapes').innerHTML = '';
        document.getElementById('layer-images').innerHTML = '';
        document.getElementById('layer-text').innerHTML = '';
        document.getElementById('layer-social').innerHTML = '';
        
        // Render each element
        state.elements.forEach(el => {
            const elementDiv = createElementDOM(el);
            if (elementDiv) {
                const layer = getLayerForType(el.type);
                if (layer) layer.appendChild(elementDiv);
            }
        });
        
        renderElementsList();
        if (selectedElementId) {
            updateTransformControls();
        } else {
            hideTransformControls();
        }
    }
    
    function getLayerForType(type) {
        if (type === 'shape') return document.getElementById('layer-shapes');
        if (type === 'image' || type === 'gif' || type === 'video') return document.getElementById('layer-images');
        if (type === 'text') return document.getElementById('layer-text');
        if (type === 'social') return document.getElementById('layer-social');
        return null;
    }
    
    function createElementDOM(el) {
        const div = document.createElement('div');
        div.className = 'draggable-element';
        div.setAttribute('data-id', el.id);
        div.style.position = 'absolute';
        
        // Apply transforms
        let transform = `translate(${el.x}px, ${el.y}px)`;
        if (el.rotation) {
            transform += ` rotate(${el.rotation}deg)`;
        }
        div.style.transform = transform;
        div.style.zIndex = el.zIndex;
        div.style.opacity = (el.opacity || 100) / 100;
        
        // Animation
        if (el.animation && el.animation !== 'none') {
            div.style.animation = `${el.animation} ${el.animationDuration || 0.5}s ease-out both`;
        }
        
        addAnimationStyles();
        
        // Content based on type
        if (el.type === 'shape') {
            if (el.shapeType === 'rectangle') {
                div.style.width = `${el.width}px`;
                div.style.height = `${el.height}px`;
                div.style.background = el.color;
                div.style.borderRadius = `${el.borderRadius}px`;
            } else if (el.shapeType === 'circle') {
                div.style.width = `${el.size}px`;
                div.style.height = `${el.size}px`;
                div.style.background = el.color;
                div.style.borderRadius = '50%';
            } else if (el.shapeType === 'line') {
                div.style.width = `${el.width}px`;
                div.style.height = `${el.thickness}px`;
                div.style.background = el.color;
                div.style.borderRadius = `${el.thickness / 2}px`;
            }
        } else if (el.type === 'image' || el.type === 'gif') {
            const img = document.createElement('img');
            img.src = el.src;
            img.crossOrigin = 'anonymous';
            img.style.width = typeof el.width === 'number' ? `${el.width}px` : el.width;
            img.style.height = typeof el.height === 'number' ? `${el.height}px` : el.height;
            img.style.objectFit = el.objectFit;
            img.style.borderRadius = `${el.borderRadius || 0}px`;
            img.style.display = 'block';
            div.appendChild(img);
            div.style.width = 'auto';
            div.style.height = 'auto';
        } else if (el.type === 'video') {
            const video = document.createElement('video');
            video.src = el.src;
            video.autoplay = true;
            video.loop = el.loop !== false;
            video.muted = true;
            video.playsInline = true;
            video.style.width = `${el.width}px`;
            video.style.height = `${el.height}px`;
            video.style.objectFit = el.objectFit;
            video.style.borderRadius = `${el.borderRadius || 0}px`;
            div.appendChild(video);
        } else if (el.type === 'text') {
            div.textContent = el.content;
            div.style.color = el.color;
            div.style.fontSize = `${el.fontSize}px`;
            div.style.fontWeight = el.fontWeight;
            div.style.fontFamily = el.fontFamily;
            div.style.textAlign = el.textAlign;
            div.style.maxWidth = `${el.maxWidth}px`;
            div.style.background = el.bgColor;
            div.style.padding = `${el.padding}px`;
            div.style.borderRadius = `${el.borderRadius}px`;
            
            const shadowMap = {
                none: 'none',
                soft: '2px 2px 8px rgba(0,0,0,0.3)',
                hard: '2px 2px 0px rgba(0,0,0,0.8)',
                glow: `0 0 15px ${el.color}`
            };
            div.style.textShadow = shadowMap[el.textShadow] || 'none';
            div.style.whiteSpace = 'pre-wrap';
        } else if (el.type === 'social') {
            const socialIcons = {
                youtube: '▶️',
                twitch: '🎮',
                tiktok: '🎵',
                instagram: '📷',
                twitter: '🐦',
                facebook: '👍',
                discord: '💬'
            };
            div.innerHTML = `
                <div style="display: flex; align-items: center; gap: 12px;">
                    <span style="font-size: ${el.iconSize}px;">${socialIcons[el.platform] || '💬'}</span>
                    <span style="color: ${el.textColor}; font-size: ${el.fontSize}px; font-weight: ${el.fontWeight};">@${el.username}</span>
                    ${el.showLiveBadge ? '<span style="color: #ff4444; font-size: 12px; background: rgba(255,68,68,0.2); padding: 2px 8px; border-radius: 20px;">LIVE</span>' : ''}
                </div>
            `;
            div.style.background = el.bgColor;
            div.style.padding = el.padding;
            div.style.borderRadius = `${el.borderRadius}px`;
            div.style.display = 'inline-block';
        }
        
        // Add click handler for selection
        div.addEventListener('mousedown', (e) => {
            e.stopPropagation();
            selectElement(el.id);
            startDrag(e, el.id);
        });
        
        return div;
    }
    
    function addAnimationStyles() {
        if (!document.getElementById('animation-styles')) {
            const style = document.createElement('style');
            style.id = 'animation-styles';
            style.textContent = `

                @keyframes slideLeft { from { transform: translateX(100px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
                @keyframes slideRight { from { transform: translateX(-100px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
                @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
                @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
                @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
                @keyframes zoomIn { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }
                @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-15px); } }

    function renderElementsList() {
        const container = document.getElementById('elementsList');
        if (state.elements.length === 0) {

                <div class="element-preview">${getElementPreview(el)}</div>
            </div>
        `).join('');
    }
    
    function getElementIcon(el) {
        const icons = {
            shape: '🔷',
            image: '🖼️',
            gif: '🎬',
            video: '📹',
            text: '📝',
            social: '💬'
        };
        return icons[el.type] || '📦';
    }
    
    function getElementName(el) {
        if (el.type === 'shape') {
            const shapes = { rectangle: 'Rectangle', circle: 'Circle', line: 'Line' };
            return shapes[el.shapeType] || 'Shape';
        }
        if (el.type === 'text') return 'Text: ' + (el.content.substring(0, 20) || '...');
        if (el.type === 'social') return `${el.platform} @${el.username}`;
        return el.type.charAt(0).toUpperCase() + el.type.slice(1);
    }
    
    function getElementPreview(el) {
        if (el.type === 'text') return el.content.substring(0, 30);
        if (el.type === 'social') return `${el.platform}: @${el.username}`;
        if (el.type === 'image' || el.type === 'gif') return el.src.substring(0, 40);
        return '';
    }
    
    // ============================================
    // TRANSFORM CONTROLS
    // ============================================
    
    let transformContainer = null;
    
    function updateTransformControls() {
        const el = state.elements.find(e => e.id === selectedElementId);
        if (!el) return;
        
        if (!transformContainer) {
            transformContainer = document.getElementById('transform-container');
        }
        
        const elementDiv = document.querySelector(`.draggable-element[data-id="${selectedElementId}"]`);
        if (!elementDiv) return;
        
        const rect = elementDiv.getBoundingClientRect();
        const canvasRect = document.getElementById('canvas').getBoundingClientRect();
        
        const left = rect.left - canvasRect.left;
        const top = rect.top - canvasRect.top;
        const width = rect.width;
        const height = rect.height;
        
        transformContainer.innerHTML = `
            <div class="transform-box" style="left: ${left-2}px; top: ${top-2}px; width: ${width+4}px; height: ${height+4}px;"></div>
            <div class="transform-handle" data-handle="nw" style="left: ${left-6}px; top: ${top-6}px;"></div>
            <div class="transform-handle" data-handle="n" style="left: ${left + width/2 - 6}px; top: ${top-6}px;"></div>
            <div class="transform-handle" data-handle="ne" style="left: ${left + width - 6}px; top: ${top-6}px;"></div>
            <div class="transform-handle" data-handle="e" style="left: ${left + width - 6}px; top: ${top + height/2 - 6}px;"></div>
            <div class="transform-handle" data-handle="se" style="left: ${left + width - 6}px; top: ${top + height - 6}px;"></div>
            <div class="transform-handle" data-handle="s" style="left: ${left + width/2 - 6}px; top: ${top + height - 6}px;"></div>
            <div class="transform-handle" data-handle="sw" style="left: ${left-6}px; top: ${top + height - 6}px;"></div>
            <div class="transform-handle" data-handle="w" style="left: ${left-6}px; top: ${top + height/2 - 6}px;"></div>
            <div class="transform-rotate" style="left: ${left + width/2 - 12}px; top: ${top - 35}px;">↻</div>
            <div class="transform-delete" style="left: ${left + width + 10}px; top: ${top - 15}px;">✕</div>
        `;
        
        document.querySelectorAll('.transform-handle').forEach(handle => {
            handle.addEventListener('mousedown', (e) => {
                e.stopPropagation();
                startResize(e, handle.dataset.handle);
            });
        });
        
        document.querySelector('.transform-rotate')?.addEventListener('mousedown', (e) => {
            e.stopPropagation();
            startRotate(e);
        });
        
        document.querySelector('.transform-delete')?.addEventListener('click', (e) => {
            e.stopPropagation();
            deleteElement(selectedElementId);
        });
    }
    
    function hideTransformControls() {
        if (transformContainer) {
            transformContainer.innerHTML = '';
        }
    }
    
    function startDrag(e, elementId) {
        isDragging = true;
        dragStart = { x: e.clientX, y: e.clientY };
        const el = state.elements.find(e => e.id === elementId);
        if (el) {
            elementStart = { x: el.x, y: el.y };
        }
        
        document.addEventListener('mousemove', onDrag);
        document.addEventListener('mouseup', stopDrag);
    }
    
    function onDrag(e) {
        if (!isDragging || selectedElementId === null) return;
        
        const dx = e.clientX - dragStart.x;
        const dy = e.clientY - dragStart.y;
        
        const el = state.elements.find(e => e.id === selectedElementId);
        if (el) {
            el.x = elementStart.x + dx;
            el.y = elementStart.y + dy;
            renderCanvas();
        }
    }
    
    function stopDrag() {
        isDragging = false;
        document.removeEventListener('mousemove', onDrag);
        document.removeEventListener('mouseup', stopDrag);
    }
    
    function startResize(e, corner) {
        const el = state.elements.find(e => e.id === selectedElementId);
        if (!el) return;
        
        isResizing = true;
        resizeCorner = corner;
        dragStart = { x: e.clientX, y: e.clientY };
        
        if (el.type === 'shape' && el.shapeType === 'rectangle') {
            elementStart = { width: el.width, height: el.height, x: el.x, y: el.y };
        } else if (el.type === 'text') {
            elementStart = { fontSize: el.fontSize, x: el.x, y: el.y };
        } else if (el.type === 'image' || el.type === 'gif' || el.type === 'video') {
            elementStart = { width: el.width, x: el.x, y: el.y };
        }
        
        document.addEventListener('mousemove', onResize);
        document.addEventListener('mouseup', stopResize);
    }
    
    function onResize(e) {
        if (!isResizing) return;
        
        const dx = e.clientX - dragStart.x;
        const dy = e.clientY - dragStart.y;
        const delta = (dx + dy) / 2;
        
        const el = state.elements.find(e => e.id === selectedElementId);
        if (!el) return;
        
        if (el.type === 'shape' && el.shapeType === 'rectangle') {
            if (resizeCorner.includes('e')) el.width = Math.max(20, elementStart.width + dx);
            if (resizeCorner.includes('w')) {
                el.width = Math.max(20, elementStart.width - dx);
                el.x = elementStart.x + dx;
            }
            if (resizeCorner.includes('s')) el.height = Math.max(20, elementStart.height + dy);
            if (resizeCorner.includes('n')) {
                el.height = Math.max(20, elementStart.height - dy);
                el.y = elementStart.y + dy;
            }
        } else if (el.type === 'text') {
            el.fontSize = Math.max(8, Math.min(200, elementStart.fontSize + delta));
        } else if (el.type === 'image' || el.type === 'gif' || el.type === 'video') {
            el.width = Math.max(40, (elementStart.width || 200) + delta);
        }
        
        renderCanvas();
    }
    
    function stopResize() {
        isResizing = false;
        document.removeEventListener('mousemove', onResize);
        document.removeEventListener('mouseup', stopResize);
    }
    
    function startRotate(e) {
        const el = state.elements.find(e => e.id === selectedElementId);
        if (!el) return;
        
        isRotating = true;
        dragStart = { x: e.clientX, y: e.clientY };
        elementStart = { rotation: el.rotation || 0 };
        
        document.addEventListener('mousemove', onRotate);
        document.addEventListener('mouseup', stopRotate);
    }
    
    function onRotate(e) {
        if (!isRotating) return;
        
        const dx = e.clientX - dragStart.x;
        const rotation = elementStart.rotation + dx * 0.5;
        
        const el = state.elements.find(e => e.id === selectedElementId);
        if (el) {
            el.rotation = rotation % 360;
            renderCanvas();
        }
    }
    
    function stopRotate() {
        isRotating = false;
        document.removeEventListener('mousemove', onRotate);
        document.removeEventListener('mouseup', stopRotate);
    }

    // ELEMENT MANAGEMENT
    // ============================================
    
    function addElement(type) {
        const template = { ...templates[type], id: state.nextId++ };
        state.elements.push(template);
        selectElement(template.id);
        renderCanvas();
        closeAddModal();
        showToast(`Added ${type} element`);
    }
    
    function addShapeMenu() {
        closeAddModal();
        document.getElementById('shapeModal').classList.add('show');
    }
    
    function addShape(shapeType) {
        const template = { ...templates[shapeType], id: state.nextId++ };
        state.elements.push(template);
        selectElement(template.id);
        renderCanvas();
        closeShapeModal();
        showToast(`Added ${shapeType}`);
    }
    
    function selectElement(id) {
        selectedElementId = id;
        renderCanvas();
        showPropertiesPanel(id);
    }
    
    function deleteElement(id) {
        state.elements = state.elements.filter(e => e.id !== id);
        if (selectedElementId === id) {
            selectedElementId = null;
            hideTransformControls();
            document.getElementById('propertiesPanel').classList.remove('show');
        }
        renderCanvas();
        showToast('Element deleted');
    }
    
    function clearCanvas() {
        if (confirm('Clear all elements? This cannot be undone.')) {
            state.elements = [];
            selectedElementId = null;
            renderCanvas();
            showToast('Canvas cleared');
        }
    }
    
    function newDesign() {
        if (state.elements.length > 0) {
            if (confirm('Start a new design? Current design will be lost if not saved.')) {
                resetDesign();
            }
        } else {
            resetDesign();
        }
    }
    
    function resetDesign() {
        state.elements = [];
        state.nextId = 1;
        state.existingDesignId = null;
        selectedElementId = null;
        document.getElementById('designName').value = '';
        document.getElementById('designDesc').value = '';
        document.getElementById('propertiesPanel').classList.remove('show');
        renderCanvas();
        showToast('New design ready');

                </div>
                <div class="prop-group">
                    <label class="prop-label">Username</label>
                    <input type="text" class="prop-input" value="${el.username}" onchange="updateElementProp('username', this.value)">
                </div>
                <div class="prop-group">
                    <label class="prop-label">Background Color</label>
                    <input type="color" class="color-input" value="${el.bgColor}" onchange="updateElementProp('bgColor', this.value)">
                </div>
                <div class="prop-group">
                    <label class="prop-label">Live Badge</label>
                    <select class="prop-select" onchange="updateElementProp('showLiveBadge', this.value === 'true')">
                        <option value="true" ${el.showLiveBadge ? 'selected' : ''}>Show</option>
                        <option value="false" ${!el.showLiveBadge ? 'selected' : ''}>Hide</option>
                    </select>
                </div>
            `;
        }
        
        content.innerHTML = html;
    }
    
    window.updateElementProp = function(prop, value) {
        const el = state.elements.find(e => e.id === selectedElementId);
        if (el) {
            el[prop] = value;
            renderCanvas();
            if (prop === 'platform') {
                showPropertiesPanel(selectedElementId);
            }
        }
    };
    
    // ============================================
    // SAVE FUNCTION with OVERWRITE
    // ============================================
    
    let pendingSave = null;
    
    async function saveDesign() {
        const name = document.getElementById('designName').value.trim();
        if (!name) {
            showToast('Please enter a design name', 'error');
            return;
        }
        
        const designData = {
            name: name,
            description: document.getElementById('designDesc').value,
            design_json: {
                elements: state.elements,
                width: CANVAS_W,
                height: CANVAS_H,
                background: 'transparent'
            }
        };
        
        showToast('Checking for existing design...');
        
        try {
            // Check if name exists
            const checkResponse = await fetch(`/api/overlay/check-name?name=${encodeURIComponent(name)}`);
            const existing = await checkResponse.json();
            
            if (existing.exists && existing.id) {
                // Show overwrite confirmation
                state.existingDesignId = existing.id;
                document.getElementById('overwriteMessage').innerHTML = `A design named "<strong>${name}</strong>" already exists.<br><br>Do you want to overwrite it?`;
                document.getElementById('overwriteModal').classList.add('show');
                pendingSave = designData;
                return;
            }
            
            // No existing - save new
            await performSave(designData);
            
        } catch (error) {
            // If check fails, proceed with save
            await performSave(designData);
        }
    }
    
    async function performSave(designData, overwriteId = null) {
        showToast('Saving design...');
        
        try {
            let url = '/api/overlay/save';
            let method = 'POST';
            let body = designData;
            
            if (overwriteId) {
                url = `/api/overlay/update/${overwriteId}`;
                method = 'PUT';
                body = designData;
            }
            
            const response = await fetch(url, {
                method: method,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body)
            });
            
            const result = await response.json();
            
            if (result.success) {
                showToast(`Saved! URL: ${result.url}`);
                await navigator.clipboard.writeText(result.url);
                showToast(`URL copied to clipboard!\n${result.url}`);
                
                if (confirm('Design saved! View it now?')) {
                    window.open(result.url, '_blank');
                }
            } else {
                showToast('Error: ' + result.error, 'error');
            }
        } catch (error) {
            showToast('Save failed: ' + error.message, 'error');
        }
    }
    
    window.confirmOverwrite = async function() {
        closeOverwriteModal();
        if (pendingSave && state.existingDesignId) {
            await performSave(pendingSave, state.existingDesignId);
            pendingSave = null;
            state.existingDesignId = null;
        }
    };
    
    // ============================================
    // HELPER FUNCTIONS
    // ============================================
    
    function showToast(message, type = 'success') {
        const toast = document.getElementById('toast');
        toast.textContent = message;
        toast.className = `toast ${type}`;
        toast.style.display = 'block';
        setTimeout(() => {
            toast.style.display = 'none';
        }, 3000);
    }
    
    function openAddModal() {
        document.getElementById('addModal').classList.add('show');
    }
    
    function closeAddModal() {
        document.getElementById('addModal').classList.remove('show');
    }
    
    function closeShapeModal() {
        document.getElementById('shapeModal').classList.remove('show');
    }
    
    function closeOverwriteModal() {
        document.getElementById('overwriteModal').classList.remove('show');
        pendingSave = null;
        state.existingDesignId = null;
    }
    
    // ============================================
    // INITIALIZATION
    // ============================================
    
    document.getElementById('saveDesignBtn').addEventListener('click', saveDesign);
    document.getElementById('clearCanvasBtn').addEventListener('click', clearCanvas);
    document.getElementById('newDesignBtn').addEventListener('click', newDesign);
    document.getElementById('newDesignBtn2').addEventListener('click', newDesign);
    document.getElementById('confirmOverwriteBtn').addEventListener('click', confirmOverwrite);
    
    // Empty canvas - no example, user must add elements
    renderCanvas();
    
    // Add welcome message
    showToast('✨ Click "Add Element" to start creating your overlay', 'success');
    
    // Prevent canvas click from deselecting
    document.getElementById('canvas').addEventListener('mousedown', (e) => {
        if (e.target === document.getElementById('canvas') || e.target.classList.contains('canvas-layer')) {
            selectedElementId = null;
            hideTransformControls();
            document.getElementById('propertiesPanel').classList.remove('show');
            renderElementsList();
        }
    });
    
    // Scale canvas
    function scaleCanvas() {
        const wrapper = document.getElementById('canvasWrapper');
        const area = document.querySelector('.canvas-area');
        const maxW = area.clientWidth - 40;
        const maxH = area.clientHeight - 40;
        const scaleX = maxW / CANVAS_W;
        const scaleY = maxH / CANVAS_H;
        const scale = Math.min(scaleX, scaleY, 1);
        document.getElementById('canvas').style.transform = `scale(${scale})`;
        wrapper.style.width = `${CANVAS_W * scale}px`;
        wrapper.style.height = `${CANVAS_H * scale}px`;
    }
    
    window.addEventListener('resize', scaleCanvas);
    setTimeout(scaleCanvas, 100);
    
    console.log('Designer ready - Start by adding elements!');
</script>
</body>
</html>
