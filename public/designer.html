<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Overlay Designer - StreamStudio</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
  background: #0A0D14;
  color: #DCE6F8;
  height: 100vh;
  overflow: hidden;
}

.app {
  display: flex;
  flex-direction: column;
  height: 100vh;
}

/* Top Bar */
.top-bar {
  background: #0F1420;
  border-bottom: 1px solid #1F2A3E;
  padding: 8px 12px;
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
  min-height: 48px;
}

.top-bar h1 {
  font-size: 13px;
  font-family: 'Space Mono', monospace;
  color: #4DFFA0;
  white-space: nowrap;
}

.top-bar input {
  padding: 6px 10px;
  background: #1A2232;
  border: 1px solid #1F2A3E;
  color: #DCE6F8;
  border-radius: 6px;
  font-size: 12px;
  flex: 1;
  min-width: 0;
}

.tool-btn {
  padding: 6px 10px;
  background: #1A2232;
  border: 1px solid #1F2A3E;
  color: #DCE6F8;
  border-radius: 6px;
  cursor: pointer;
  font-size: 11px;
  font-family: 'Space Mono', monospace;
  transition: all 0.15s;
  white-space: nowrap;
  flex-shrink: 0;
}

.tool-btn:hover, .tool-btn:active {
  background: #4DFFA0;
  color: #0A0D14;
  border-color: #4DFFA0;
}

.tool-btn.danger {
  color: #ef4444;
  border-color: #ef4444;
}

.tool-btn.danger:hover {
  background: #ef4444;
  color: #fff;
}

.tool-btn.success {
  background: #4DFFA0;
  color: #0A0D14;
  border-color: #4DFFA0;
}

.spacer {
  flex: 1;
}

.desktop-toggles {
  display: flex;
  gap: 8px;
}

/* Main Layout */
.main {
  display: flex;
  flex: 1;
  overflow: hidden;
  position: relative;
}

/* Desktop Panels */
.panel {
  width: 260px;
  background: #0F1420;
  border-right: 1px solid #1F2A3E;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  flex-shrink: 0;
  transition: width 0.22s;
}

.panel.collapsed {
  width: 0;
}

.panel-inner {
  width: 260px;
  display: flex;
  flex-direction: column;
  height: 100%;
  overflow: hidden;
}

.props-panel {
  width: 300px;
  background: #0F1420;
  border-left: 1px solid #1F2A3E;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  flex-shrink: 0;
  transition: width 0.22s;
}

.props-panel.collapsed {
  width: 0;
}

.props-inner {
  width: 300px;
  overflow-y: auto;
  height: 100%;
}

/* Sections */
.section-title {
  font-size: 9px;
  font-family: 'Space Mono', monospace;
  color: #6A7A9A;
  letter-spacing: 1px;
  padding: 10px 12px 6px;
  text-transform: uppercase;
  border-bottom: 1px solid #1F2A3E;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}

.section-close {
  background: none;
  border: none;
  color: #6A7A9A;
  cursor: pointer;
  font-size: 16px;
  line-height: 1;
  padding: 0 2px;
}

.section-close:hover {
  color: #ef4444;
}

.elements-list {
  flex: 1;
  overflow-y: auto;
  padding: 8px;
}

.element-item {
  background: #1A2232;
  border: 1px solid #1F2A3E;
  border-radius: 6px;
  padding: 8px;
  cursor: pointer;
  transition: all 0.15s;
  margin-bottom: 6px;
}

.element-item:hover {
  border-color: #4DFFA0;
}

.element-item.selected {
  border-color: #4DFFA0;
  background: #1F2A3E;
}

.element-header {
  display: flex;
  align-items: center;
  gap: 6px;
}

.element-icon {
  font-size: 14px;
}

.element-name {
  flex: 1;
  font-size: 11px;
  font-weight: 600;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.element-badge {
  font-size: 9px;
  background: #1F3020;
  color: #4DFFA0;
  border: 1px solid #2A4A30;
  border-radius: 3px;
  padding: 1px 4px;
  white-space: nowrap;
}

.element-delete {
  background: none;
  border: none;
  color: #6A7A9A;
  cursor: pointer;
  font-size: 12px;
  padding: 2px 4px;
}

.element-delete:hover {
  color: #ef4444;
}

.empty-state {
  text-align: center;
  color: #6A7A9A;
  padding: 30px 12px;
  font-size: 11px;
  line-height: 1.8;
}

/* Canvas Area */
.canvas-area {
  flex: 1;
  background: #07090F;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}

.canvas-wrapper {
  position: relative;
  box-shadow: 0 8px 40px rgba(0,0,0,0.6);
}

#canvas {
  position: relative;
  width: 1920px;
  height: 1080px;
  background: transparent;
  overflow: hidden;
  transform-origin: top left;
}

#canvas::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image: linear-gradient(45deg, #1a1a2e 25%, transparent 25%),
                    linear-gradient(-45deg, #1a1a2e 25%, transparent 25%),
                    linear-gradient(45deg, transparent 75%, #1a1a2e 75%),
                    linear-gradient(-45deg, transparent 75%, #1a1a2e 75%);
  background-size: 20px 20px;
  background-position: 0 0, 0 10px, 10px -10px, -10px 0;
  opacity: 0.3;
  pointer-events: none;
  z-index: 0;
}

.canvas-layer {
  position: absolute;
  inset: 0;
}

#layer-shapes, #layer-images, #layer-text, #layer-social {
  pointer-events: auto;
}

/* Transform Controls */
#transform-container {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 10000;
}

.transform-box {
  position: absolute;
  border: 2px solid #4DFFA0;
  background: rgba(77,255,160,0.04);
  pointer-events: none;
}

.transform-handle {
  position: absolute;
  width: 10px;
  height: 10px;
  background: #4DFFA0;
  border: 2px solid #0A0D14;
  border-radius: 50%;
  pointer-events: auto;
  z-index: 10001;
}

.transform-rotate {
  position: absolute;
  width: 22px;
  height: 22px;
  background: #4D9FFF;
  border: 2px solid #0A0D14;
  border-radius: 50%;
  pointer-events: auto;
  cursor: grab;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  z-index: 10001;
}

.transform-rotate:active {
  cursor: grabbing;
}

.transform-delete {
  position: absolute;
  width: 22px;
  height: 22px;
  background: #ef4444;
  border: 2px solid #0A0D14;
  border-radius: 50%;
  pointer-events: auto;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  color: #fff;
  font-weight: bold;
  z-index: 10001;
}

/* Properties */
.prop-group {
  padding: 8px 12px;
  border-bottom: 1px solid #1F2A3E;
}

.prop-label {
  font-size: 9px;
  font-family: 'Space Mono', monospace;
  color: #6A7A9A;
  margin-bottom: 4px;
  display: block;
  text-transform: uppercase;
}

.prop-input, .prop-select {
  width: 100%;
  padding: 5px 8px;
  background: #1A2232;
  border: 1px solid #1F2A3E;
  color: #DCE6F8;
  border-radius: 4px;
  font-size: 11px;
}

.prop-input:focus, .prop-select:focus {
  outline: none;
  border-color: #4DFFA0;
}

.prop-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px;
}

.color-input {
  width: 100%;
  height: 28px;
  padding: 2px;
  border-radius: 4px;
  border: 1px solid #1F2A3E;
  background: #1A2232;
  cursor: pointer;
}

.props-section-hdr {
  font-size: 9px;
  font-family: 'Space Mono', monospace;
  color: #4DFFA0;
  letter-spacing: 1px;
  padding: 10px 12px 4px;
  text-transform: uppercase;
  background: #111928;
  border-bottom: 1px solid #1F2A3E;
  border-top: 1px solid #1F2A3E;
  display: flex;
  align-items: center;
  gap: 6px;
}

.anim-preview-btn {
  padding: 6px 10px;
  background: #1A2232;
  border: 1px solid #4DFFA0;
  color: #4DFFA0;
  border-radius: 4px;
  cursor: pointer;
  font-size: 10px;
  font-family: 'Space Mono', monospace;
  width: 100%;
  margin-top: 6px;
  transition: all 0.15s;
}

.anim-preview-btn:hover {
  background: #4DFFA0;
  color: #0A0D14;
}

.anim-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 6px;
  padding: 10px 12px;
}

.anim-card {
  background: #1A2232;
  border: 1px solid #1F2A3E;
  border-radius: 6px;
  padding: 8px 4px;
  text-align: center;
  cursor: pointer;
  transition: all 0.15s;
  font-size: 10px;
  font-family: 'Space Mono', monospace;
  color: #6A7A9A;
}

.anim-card:hover {
  border-color: #4DFFA0;
  color: #4DFFA0;
}

.anim-card.selected {
  border-color: #4DFFA0;
  background: #1F2A3E;
  color: #4DFFA0;
}

.anim-card .anim-icon {
  font-size: 18px;
  margin-bottom: 4px;
}

.anim-card .anim-name {
  font-size: 9px;
}

/* Modal */
.modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 20000;
}

.modal.show {
  display: flex;
}

.modal-content {
  background: #0F1420;
  border: 1px solid #1F2A3E;
  border-radius: 10px;
  width: 400px;
  max-width: 92vw;
  max-height: 85vh;
  overflow-y: auto;
}

.modal-header {
  padding: 14px 16px;
  border-bottom: 1px solid #1F2A3E;
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 14px;
  font-weight: 600;
}

.modal-body {
  padding: 12px;
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
}

.element-option {
  background: #1A2232;
  border: 1px solid #1F2A3E;
  border-radius: 8px;
  padding: 14px;
  text-align: center;
  cursor: pointer;
  transition: all 0.15s;
}

.element-option:hover, .element-option:active {
  border-color: #4DFFA0;
  transform: translateY(-2px);
}

.element-option .emoji {
  font-size: 24px;
  margin-bottom: 6px;
}

.element-option .name {
  font-size: 11px;
  font-weight: 600;
}

/* Toast */
.toast {
  position: fixed;
  bottom: 70px;
  left: 50%;
  transform: translateX(-50%);
  background: #4DFFA0;
  color: #0A0D14;
  padding: 10px 18px;
  border-radius: 8px;
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  z-index: 30000;
  display: none;
  max-width: 88vw;
  text-align: center;
}

.toast.error {
  background: #ef4444;
  color: #fff;
}

/* Draggable Elements */
.draggable-element {
  position: absolute;
  cursor: move;
  user-select: none;
  -webkit-user-select: none;
}

.draggable-element:hover {
  outline: 1px solid rgba(77,255,160,0.4);
  outline-offset: 1px;
}

/* Mobile */
.mobile-bar {
  display: none;
  background: #0F1420;
  border-top: 1px solid #1F2A3E;
  padding: 8px 10px;
  gap: 5px;
  flex-shrink: 0;
}

.mob-btn {
  flex: 1;
  padding: 9px 2px;
  background: #1A2232;
  border: 1px solid #1F2A3E;
  color: #DCE6F8;
  border-radius: 8px;
  font-size: 9px;
  font-family: 'Space Mono', monospace;
  cursor: pointer;
  text-align: center;
}

.mob-btn:active, .mob-btn.active {
  background: #4DFFA0;
  color: #0A0D14;
  border-color: #4DFFA0;
}

.mob-btn.save {
  background: #4DFFA0;
  color: #0A0D14;
  border-color: #4DFFA0;
}

.drawer {
  display: none;
  position: absolute;
  top: 0;
  bottom: 0;
  z-index: 600;
  transition: transform 0.25s ease;
  overflow: hidden;
}

.drawer-left {
  left: 0;
  width: 260px;
  transform: translateX(-100%);
}

.drawer-right {
  right: 0;
  width: 300px;
  transform: translateX(100%);
}

.drawer.open {
  transform: translateX(0);
}

.drawer-backdrop {
  display: none;
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 599;
}

.drawer-backdrop.show {
  display: block;
}

.drawer-inner {
  background: #0F1420;
  border: 1px solid #1F2A3E;
  height: 100%;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.drawer-left .drawer-inner {
  border-left: none;
  border-radius: 0 10px 10px 0;
}

.drawer-right .drawer-inner {
  border-right: none;
  border-radius: 10px 0 0 10px;
}

.drawer-scroll {
  flex: 1;
  overflow-y: auto;
}

/* Scrollbar */
::-webkit-scrollbar {
  width: 4px;
  height: 4px;
}

::-webkit-scrollbar-track {
  background: #1A2232;
}

::-webkit-scrollbar-thumb {
  background: #4DFFA0;
  border-radius: 2px;
}

/* Responsive */
@media (max-width: 768px) {
  .panel, .props-panel, .desktop-toggles {
    display: none !important;
  }
  .mobile-bar {
    display: flex;
  }
  .drawer {
    display: block;
  }
}
</style>
</head>
<body>
<div class="app">
  <div class="top-bar">
    <h1>🎨 Overlay Designer</h1>
    <input type="text" id="designName" placeholder="Design name...">
    <button class="tool-btn" onclick="openAddModal()">+ Add</button>
    <button class="tool-btn danger" onclick="clearCanvas()">🗑 Clear</button>
    <button class="tool-btn" onclick="newDesign()">✨ New</button>
    <div class="spacer"></div>
    <div class="desktop-toggles">
      <button class="tool-btn" onclick="toggleDesktopPanel('left')">☰ Layers</button>
      <button class="tool-btn" onclick="toggleDesktopPanel('right')">⚙ Props</button>
      <button class="tool-btn success" onclick="saveDesign()">💾 Save</button>
    </div>
  </div>

  <div class="main">
    <!-- Left Panel - Layers -->
    <div class="panel" id="leftPanel">
      <div class="panel-inner">
        <div class="section-title">📦 Layers</div>
        <div id="elementsListDesktop" class="elements-list">
          <div class="empty-state">Click "+ Add"<br>to start</div>
        </div>
      </div>
    </div>

    <!-- Canvas Area -->
    <div class="canvas-area" id="canvasArea">
      <div class="canvas-wrapper" id="canvasWrapper">
        <div id="canvas">
          <div id="layer-shapes" class="canvas-layer"></div>
          <div id="layer-images" class="canvas-layer"></div>
          <div id="layer-text" class="canvas-layer"></div>
          <div id="layer-social" class="canvas-layer"></div>
          <div id="transform-container"></div>
        </div>
      </div>
    </div>

    <!-- Right Panel - Properties -->
    <div class="props-panel" id="rightPanel">
      <div class="props-inner">
        <div class="section-title">⚙️ Properties</div>
        <div id="propertiesContentDesktop">
          <div class="empty-state" style="padding:20px 12px">Select an element</div>
        </div>
      </div>
    </div>

    <!-- Mobile Drawers -->
    <div class="drawer-backdrop" id="drawerBackdrop" onclick="closeAllDrawers()"></div>
    <div class="drawer drawer-left" id="drawerLeft">
      <div class="drawer-inner">
        <div class="section-title">📦 Layers <button class="section-close" onclick="closeDrawer('left')">✕</button></div>
        <div class="drawer-scroll"><div id="elementsListMobile" class="elements-list"></div></div>
      </div>
    </div>
    <div class="drawer drawer-right" id="drawerRight">
      <div class="drawer-inner">
        <div class="section-title">⚙️ Properties <button class="section-close" onclick="closeDrawer('right')">✕</button></div>
        <div class="drawer-scroll"><div id="propertiesContentMobile"></div></div>
      </div>
    </div>
  </div>

  <!-- Mobile Bottom Bar -->
  <div class="mobile-bar">
    <button class="mob-btn" id="mobLayersBtn" onclick="toggleMobileDrawer('left')">☰<br>Layers</button>
    <button class="mob-btn" onclick="openAddModal()">+<br>Add</button>
    <button class="mob-btn" id="mobPropsBtn" onclick="toggleMobileDrawer('right')">⚙<br>Props</button>
    <button class="mob-btn" onclick="clearCanvas()">🗑<br>Clear</button>
    <button class="mob-btn save" onclick="saveDesign()">💾<br>Save</button>
  </div>
</div>

<div id="toast" class="toast"></div>

<!-- Add Element Modal -->
<div id="addModal" class="modal">
  <div class="modal-content">
    <div class="modal-header">
      Add Element
      <button onclick="closeAddModal()" style="background:none;border:none;color:#fff;font-size:18px;cursor:pointer;">✕</button>
    </div>
    <div class="modal-body">
      <div class="element-option" onclick="addShape('rectangle')"><div class="emoji">▬</div><div class="name">Rectangle</div></div>
      <div class="element-option" onclick="addShape('circle')"><div class="emoji">⬤</div><div class="name">Circle</div></div>
      <div class="element-option" onclick="addShape('line')"><div class="emoji">━</div><div class="name">Line</div></div>
      <div class="element-option" onclick="addElement('image')"><div class="emoji">🖼️</div><div class="name">Image</div></div>
      <div class="element-option" onclick="addElement('text')"><div class="emoji">T</div><div class="name">Text</div></div>
      <div class="element-option" onclick="addElement('social')"><div class="emoji">💬</div><div class="name">Social Badge</div></div>
    </div>
  </div>
</div>

<script>
// Animation keyframes
(function() {
  const s = document.createElement('style');
  s.textContent = `
    @keyframes ov-fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes ov-fadeOut { from { opacity: 1; } to { opacity: 0; } }
    @keyframes ov-slideUp { from { transform: translateY(80px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    @keyframes ov-slideDown { from { transform: translateY(-80px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    @keyframes ov-slideLeft { from { transform: translateX(120px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    @keyframes ov-slideRight { from { transform: translateX(-120px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    @keyframes ov-zoomIn { from { transform: scale(0.3); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    @keyframes ov-zoomOut { from { transform: scale(1.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    @keyframes ov-bounceIn { 0% { transform: scale(0.4); opacity: 0; } 60% { transform: scale(1.1); } 80% { transform: scale(0.95); } 100% { transform: scale(1); opacity: 1; } }
    @keyframes ov-flipX { from { transform: rotateX(90deg); opacity: 0; } to { transform: rotateX(0); opacity: 1; } }
    @keyframes ov-flipY { from { transform: rotateY(90deg); opacity: 0; } to { transform: rotateY(0); opacity: 1; } }
    @keyframes ov-pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.08); } }
    @keyframes ov-shake { 0%, 100% { transform: translateX(0); } 20% { transform: translateX(-12px); } 40% { transform: translateX(12px); } 60% { transform: translateX(-8px); } 80% { transform: translateX(8px); } }
    @keyframes ov-swing { 0%, 100% { transform: rotate(0deg); } 25% { transform: rotate(8deg); } 75% { transform: rotate(-8deg); } }
    @keyframes ov-float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-18px); } }
    @keyframes ov-spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    @keyframes ov-typewriter { from { clip-path: inset(0 100% 0 0); } to { clip-path: inset(0 0% 0 0); } }
    @keyframes ov-glitch { 0%, 100% { transform: translate(0); } 20% { transform: translate(-4px, 2px); } 40% { transform: translate(4px, -2px); } 60% { transform: translate(-2px, -4px); } 80% { transform: translate(2px, 4px); } }
    @keyframes ov-flicker { 0%, 100% { opacity: 1; } 10% { opacity: 0.1; } 30% { opacity: 1; } 50% { opacity: 0.3; } 70% { opacity: 1; } 90% { opacity: 0.2; } }
    @keyframes ov-rollIn { from { transform: translateX(-200px) rotate(-120deg); opacity: 0; } to { transform: translateX(0) rotate(0); opacity: 1; } }
    @keyframes ov-dropIn { 0% { transform: translateY(-200px) rotate(10deg); opacity: 0; } 70% { transform: translateY(12px) rotate(-2deg); } 100% { transform: translateY(0) rotate(0); opacity: 1; } }
  `;
  document.head.appendChild(s);
})();

const ANIMS = [
  { id: 'none', label: 'None', icon: '⊘', loop: false },
  { id: 'fadeIn', label: 'Fade In', icon: '✨', loop: false },
  { id: 'fadeOut', label: 'Fade Out', icon: '🌫️', loop: false },
  { id: 'slideUp', label: 'Slide Up', icon: '⬆️', loop: false },
  { id: 'slideDown', label: 'Slide Down', icon: '⬇️', loop: false },
  { id: 'slideLeft', label: 'Slide Left', icon: '⬅️', loop: false },
  { id: 'slideRight', label: 'Slide Right', icon: '➡️', loop: false },
  { id: 'zoomIn', label: 'Zoom In', icon: '🔍', loop: false },
  { id: 'zoomOut', label: 'Zoom Out', icon: '🔎', loop: false },
  { id: 'bounceIn', label: 'Bounce In', icon: '🏀', loop: false },
  { id: 'flipX', label: 'Flip X', icon: '↕️', loop: false },
  { id: 'flipY', label: 'Flip Y', icon: '↔️', loop: false },
  { id: 'pulse', label: 'Pulse', icon: '💗', loop: true },
  { id: 'shake', label: 'Shake', icon: '📳', loop: false },
  { id: 'swing', label: 'Swing', icon: '🎵', loop: true },
  { id: 'float', label: 'Float', icon: '🎈', loop: true },
  { id: 'spin', label: 'Spin', icon: '🌀', loop: true },
  { id: 'typewriter', label: 'Typewriter', icon: '⌨️', loop: false },
  { id: 'glitch', label: 'Glitch', icon: '⚡', loop: false },
  { id: 'flicker', label: 'Flicker', icon: '💡', loop: true },
  { id: 'rollIn', label: 'Roll In', icon: '🎲', loop: false },
  { id: 'dropIn', label: 'Drop In', icon: '💧', loop: false }
];

const CANVAS_W = 1920, CANVAS_H = 1080;
let state = { elements: [], nextId: 1 };
let selectedId = null, canvasScale = 1, dragState = null;

function scaleCanvas() {
  const area = document.getElementById('canvasArea');
  if (!area) return;
  const scaleX = (area.clientWidth - 16) / CANVAS_W;
  const scaleY = (area.clientHeight - 16) / CANVAS_H;
  canvasScale = Math.min(scaleX, scaleY, 1);
  document.getElementById('canvas').style.transform = `scale(${canvasScale})`;
  document.getElementById('canvasWrapper').style.width = (CANVAS_W * canvasScale) + 'px';
  document.getElementById('canvasWrapper').style.height = (CANVAS_H * canvasScale) + 'px';
}

window.addEventListener('resize', scaleCanvas);
setTimeout(scaleCanvas, 100);

const TEMPLATES = {
  rectangle: { type: 'shape', shapeType: 'rectangle', width: 300, height: 120, borderRadius: 0, color: '#4DFFA0', x: CANVAS_W/2-150, y: CANVAS_H/2-60, zIndex: 10, opacity: 100, rotation: 0, animation: 'none', animDuration: 0.6, animDelay: 0, animEasing: 'ease-out' },
  circle: { type: 'shape', shapeType: 'circle', size: 100, color: '#4D9FFF', x: CANVAS_W/2-50, y: CANVAS_H/2-50, zIndex: 10, opacity: 100, rotation: 0, animation: 'none', animDuration: 0.6, animDelay: 0, animEasing: 'ease-out' },
  line: { type: 'shape', shapeType: 'line', width: 300, thickness: 4, color: '#FFFFFF', x: CANVAS_W/2-150, y: CANVAS_H/2, zIndex: 10, opacity: 100, rotation: 0, animation: 'none', animDuration: 0.6, animDelay: 0, animEasing: 'ease-out' },
  image: { type: 'image', src: 'https://placehold.co/400x225/4DFFA0/0A0D14?text=Image', width: 400, borderRadius: 0, x: CANVAS_W/2-200, y: CANVAS_H/2-112, zIndex: 10, opacity: 100, animation: 'none', animDuration: 0.6, animDelay: 0, animEasing: 'ease-out' },
  text: { type: 'text', content: 'New Text', fontSize: 60, fontWeight: 'bold', color: '#FFFFFF', fontFamily: 'DM Sans,sans-serif', textAlign: 'left', textShadow: 'none', bgColor: 'transparent', padding: 0, borderRadius: 0, maxWidth: 600, x: CANVAS_W/2-300, y: CANVAS_H/2-40, zIndex: 10, opacity: 100, rotation: 0, animation: 'none', animDuration: 0.6, animDelay: 0, animEasing: 'ease-out' },
  social: { type: 'social', platform: 'youtube', username: 'streamstudio', showLiveBadge: true, bgColor: 'rgba(0,0,0,0.75)', textColor: '#FFFFFF', fontSize: 22, iconSize: 32, padding: '10px 20px', borderRadius: 50, x: 80, y: CANVAS_H-130, zIndex: 10, opacity: 100, animation: 'none', animDuration: 0.6, animDelay: 0, animEasing: 'ease-out' }
};

function buildAnimCSS(el) {
  if (!el.animation || el.animation === 'none') return '';
  const meta = ANIMS.find(a => a.id === el.animation) || { loop: false };
  const iter = meta.loop ? 'infinite' : '1';
  const fill = meta.loop ? 'none' : 'both';
  return `ov-${el.animation} ${el.animDuration || 0.6}s ${el.animEasing || 'ease-out'} ${el.animDelay || 0}s ${iter} ${fill}`;
}

function renderCanvas() {
  const layers = ['layer-shapes', 'layer-images', 'layer-text', 'layer-social'];
  layers.forEach(id => document.getElementById(id).innerHTML = '');
  
  state.elements.forEach(el => {
    const div = makeDOM(el);
    if (!div) return;
    const layerMap = { shape: 'layer-shapes', image: 'layer-images', text: 'layer-text', social: 'layer-social' };
    document.getElementById(layerMap[el.type]).appendChild(div);
  });
  
  renderLists();
  selectedId ? updateTransform() : hideTransform();
}

function makeDOM(el) {
  const div = document.createElement('div');
  div.className = 'draggable-element';
  div.dataset.id = el.id;
  div.style.cssText = `position:absolute;transform:translate(${el.x}px,${el.y}px) rotate(${el.rotation||0}deg);z-index:${el.zIndex};opacity:${(el.opacity||100)/100};`;
  
  const anim = buildAnimCSS(el);
  if (anim) div.style.animation = anim;
  
  if (el.type === 'shape') {
    if (el.shapeType === 'rectangle') {
      div.style.width = el.width + 'px';
      div.style.height = el.height + 'px';
      div.style.background = el.color;
      div.style.borderRadius = el.borderRadius + 'px';
    } else if (el.shapeType === 'circle') {
      div.style.width = el.size + 'px';
      div.style.height = el.size + 'px';
      div.style.background = el.color;
      div.style.borderRadius = '50%';
    } else if (el.shapeType === 'line') {
      div.style.width = el.width + 'px';
      div.style.height = el.thickness + 'px';
      div.style.background = el.color;
      div.style.borderRadius = (el.thickness / 2) + 'px';
    }
  } else if (el.type === 'image') {
    const img = document.createElement('img');
    img.src = el.src;
    img.crossOrigin = 'anonymous';
    img.style.cssText = `width:${el.width}px;height:auto;border-radius:${el.borderRadius||0}px;display:block;`;
    div.appendChild(img);
  } else if (el.type === 'text') {
    div.textContent = el.content;
    const shadows = { soft: '2px 2px 8px rgba(0,0,0,0.4)', hard: '2px 2px 0 rgba(0,0,0,0.9)', glow: `0 0 20px ${el.color}` };
    div.style.color = el.color;
    div.style.fontSize = el.fontSize + 'px';
    div.style.fontWeight = el.fontWeight;
    div.style.fontFamily = el.fontFamily;
    div.style.textAlign = el.textAlign;
    div.style.maxWidth = el.maxWidth + 'px';
    div.style.background = el.bgColor;
    div.style.padding = el.padding + 'px';
    div.style.borderRadius = el.borderRadius + 'px';
    div.style.whiteSpace = 'pre-wrap';
    div.style.textShadow = shadows[el.textShadow] || 'none';
  } else if (el.type === 'social') {
    const icons = { youtube: '▶', twitch: '◉', tiktok: '♪', instagram: '◎', twitter: '𝕏', facebook: 'f' };
    div.innerHTML = `<div style="display:flex;align-items:center;gap:10px;">
      <span style="font-size:${el.iconSize}px">${icons[el.platform] || '◈'}</span>
      <span style="color:${el.textColor};font-size:${el.fontSize}px;font-weight:bold">@${el.username}</span>
      ${el.showLiveBadge ? '<span style="color:#ff4444;font-size:13px;background:rgba(255,68,68,0.2);padding:2px 8px;border-radius:20px">LIVE</span>' : ''}
    </div>`;
    div.style.background = el.bgColor;
    div.style.padding = el.padding;
    div.style.borderRadius = el.borderRadius + 'px';
    div.style.display = 'inline-block';
  }
  
  div.addEventListener('mousedown', e => { e.stopPropagation(); selectEl(el.id); startDrag(e, el.id); });
  div.addEventListener('touchstart', e => { e.preventDefault(); e.stopPropagation(); selectEl(el.id); startDragTouch(e, el.id); }, { passive: false });
  return div;
}

function renderLists() {
  const icons = { shape: '🔷', image: '🖼️', text: '📝', social: '💬' };
  const html = state.elements.length ? [...state.elements].reverse().map(el => {
    const hasAnim = el.animation && el.animation !== 'none';
    return `<div class="element-item ${selectedId === el.id ? 'selected' : ''}" onclick="selectEl(${el.id})">
      <div class="element-header">
        <span class="element-icon">${icons[el.type] || '📦'}</span>
        <span class="element-name">${getElName(el)}</span>
        ${hasAnim ? `<span class="element-badge">▶ ${el.animation}</span>` : ''}
        <button class="element-delete" onclick="event.stopPropagation();deleteEl(${el.id})">🗑</button>
      </div>
    </div>`;
  }).join('') : '<div class="empty-state">No elements yet<br>Click "+ Add"</div>';
  
  document.getElementById('elementsListDesktop').innerHTML = html;
  document.getElementById('elementsListMobile').innerHTML = html;
}

function getElName(el) {
  if (el.type === 'shape') return el.shapeType[0].toUpperCase() + el.shapeType.slice(1);
  if (el.type === 'text') return 'Text: ' + (el.content || '').substring(0, 14);
  if (el.type === 'social') return el.platform + ' @' + el.username;
  return el.type[0].toUpperCase() + el.type.slice(1);
}

function updateTransform() {
  const el = state.elements.find(e => e.id === selectedId);
  if (!el) return;
  const elDiv = document.querySelector(`.draggable-element[data-id="${selectedId}"]`);
  if (!elDiv) return;
  const rect = elDiv.getBoundingClientRect();
  const canvasRect = document.getElementById('canvas').getBoundingClientRect();
  const left = (rect.left - canvasRect.left) / canvasScale;
  const top = (rect.top - canvasRect.top) / canvasScale;
  const width = rect.width / canvasScale;
  const height = rect.height / canvasScale;
  
  const tc = document.getElementById('transform-container');
  tc.innerHTML = `
    <div class="transform-box" style="left:${left-2}px;top:${top-2}px;width:${width+4}px;height:${height+4}px;"></div>
    <div class="transform-handle" data-h="nw" style="left:${left-5}px;top:${top-5}px;cursor:nw-resize"></div>
    <div class="transform-handle" data-h="n" style="left:${left+width/2-5}px;top:${top-5}px;cursor:n-resize"></div>
    <div class="transform-handle" data-h="ne" style="left:${left+width-5}px;top:${top-5}px;cursor:ne-resize"></div>
    <div class="transform-handle" data-h="e" style="left:${left+width-5}px;top:${top+height/2-5}px;cursor:e-resize"></div>
    <div class="transform-handle" data-h="se" style="left:${left+width-5}px;top:${top+height-5}px;cursor:se-resize"></div>
    <div class="transform-handle" data-h="s" style="left:${left+width/2-5}px;top:${top+height-5}px;cursor:s-resize"></div>
    <div class="transform-handle" data-h="sw" style="left:${left-5}px;top:${top+height-5}px;cursor:sw-resize"></div>
    <div class="transform-handle" data-h="w" style="left:${left-5}px;top:${top+height/2-5}px;cursor:w-resize"></div>
    <div class="transform-rotate" style="left:${left+width/2-11}px;top:${top-32}px">↻</div>
    <div class="transform-delete" style="left:${left+width+6}px;top:${top-11}px">✕</div>
  `;
  
  tc.querySelectorAll('.transform-handle').forEach(h => h.addEventListener('mousedown', e => { e.stopPropagation(); startResize(e, h.dataset.h); }));
  tc.querySelector('.transform-rotate')?.addEventListener('mousedown', e => { e.stopPropagation(); startRotate(e); });
  tc.querySelector('.transform-delete')?.addEventListener('click', e => { e.stopPropagation(); deleteEl(selectedId); });
}

function hideTransform() { document.getElementById('transform-container').innerHTML = ''; }

function startDrag(e, id) {
  const el = state.elements.find(e => e.id === id);
  if (!el) return;
  dragState = { mode: 'drag', id, sx: e.clientX, sy: e.clientY, ex: el.x, ey: el.y };
  document.addEventListener('mousemove', onMouseMove);
  document.addEventListener('mouseup', onMouseUp);
}

function startDragTouch(e, id) {
  const t = e.touches[0];
  const el = state.elements.find(e => e.id === id);
  if (!el) return;
  dragState = { mode: 'drag', id, sx: t.clientX, sy: t.clientY, ex: el.x, ey: el.y };
  document.addEventListener('touchmove', onTouchMove, { passive: false });
  document.addEventListener('touchend', onTouchEnd);
}

function startResize(e, corner) {
  const el = state.elements.find(e => e.id === selectedId);
  if (!el) return;
  dragState = { mode: 'resize', corner, sx: e.clientX, sy: e.clientY, sw: el.width || el.size || 200, sh: el.height || el.size || 100, startX: el.x, startY: el.y, sfs: el.fontSize || 60 };
  document.addEventListener('mousemove', onMouseMove);
  document.addEventListener('mouseup', onMouseUp);
}

function startRotate(e) {
  const el = state.elements.find(e => e.id === selectedId);
  if (!el) return;
  dragState = { mode: 'rotate', sx: e.clientX, srot: el.rotation || 0 };
  document.addEventListener('mousemove', onMouseMove);
  document.addEventListener('mouseup', onMouseUp);
}

function onMouseMove(e) { handleDrag(e.clientX, e.clientY); }
function onTouchMove(e) { e.preventDefault(); handleDrag(e.touches[0].clientX, e.touches[0].clientY); }
function onMouseUp() { dragState = null; document.removeEventListener('mousemove', onMouseMove); document.removeEventListener('mouseup', onMouseUp); }
function onTouchEnd() { dragState = null; document.removeEventListener('touchmove', onTouchMove); document.removeEventListener('touchend', onTouchEnd); }

function handleDrag(cx, cy) {
  if (!dragState) return;
  const dx = cx - dragState.sx, dy = cy - dragState.sy;
  
  if (dragState.mode === 'drag') {
    const el = state.elements.find(e => e.id === dragState.id);
    if (el) {
      el.x = dragState.ex + dx / canvasScale;
      el.y = dragState.ey + dy / canvasScale;
    }
  } else if (dragState.mode === 'resize') {
    const el = state.elements.find(e => e.id === selectedId);
    if (!el) return;
    const sdx = dx / canvasScale, sdy = dy / canvasScale;
    const corner = dragState.corner;
    
    if (el.type === 'shape' && el.shapeType === 'rectangle') {
      if (corner.includes('e')) el.width = Math.max(20, dragState.sw + sdx);
      if (corner.includes('w')) { el.width = Math.max(20, dragState.sw - sdx); el.x = dragState.startX + sdx; }
      if (corner.includes('s')) el.height = Math.max(10, dragState.sh + sdy);
      if (corner.includes('n')) { el.height = Math.max(10, dragState.sh - sdy); el.y = dragState.startY + sdy; }
    } else if (el.type === 'shape' && el.shapeType === 'circle') {
      el.size = Math.max(20, dragState.sw + (sdx + sdy) / 2);
    } else if (el.type === 'text') {
      el.fontSize = Math.max(10, Math.min(300, dragState.sfs + (sdx + sdy) / 2));
    } else if (el.type === 'image') {
      el.width = Math.max(40, dragState.sw + sdx);
    }
  } else if (dragState.mode === 'rotate') {
    const el = state.elements.find(e => e.id === selectedId);
    if (el) el.rotation = (dragState.srot + dx * 0.6) % 360;
  }
  renderCanvas();
}

function addElement(type) {
  const newEl = { ...TEMPLATES[type], id: state.nextId++ };
  state.elements.push(newEl);
  selectEl(newEl.id);
  renderCanvas();
  closeAddModal();
  showToast('Added ' + type);
}

function addShape(shapeType) {
  const newEl = { ...TEMPLATES[shapeType], id: state.nextId++ };
  state.elements.push(newEl);
  selectEl(newEl.id);
  renderCanvas();
  closeAddModal();
  showToast('Added ' + shapeType);
}

function selectEl(id) {
  selectedId = id;
  renderCanvas();
  showProperties(id);
  if (window.innerWidth <= 768) openDrawer('right');
}

function deleteEl(id) {
  state.elements = state.elements.filter(e => e.id !== id);
  if (selectedId === id) {
    selectedId = null;
    hideTransform();
    setPropertiesContent('<div class="empty-state" style="padding:20px 12px">Select an element</div>');
  }
  renderCanvas();
  showToast('Deleted');
}

function clearCanvas() {
  if (confirm('Clear all elements? This cannot be undone.')) {
    state.elements = [];
    selectedId = null;
    renderCanvas();
    showToast('Canvas cleared');
  }
}

function newDesign() {
  if (state.elements.length === 0 || confirm('Start a new design? Current design will be lost if not saved.')) {
    state.elements = [];
    state.nextId = 1;
    selectedId = null;
    document.getElementById('designName').value = '';
    renderCanvas();
    showToast('New design ready');
  }
}

function previewAnimation(id) {
  const elDiv = document.querySelector(`.draggable-element[data-id="${id}"]`);
  if (!elDiv) return;
  const el = state.elements.find(e => e.id === id);
  if (!el || el.animation === 'none') return;
  elDiv.style.animation = 'none';
  elDiv.offsetHeight;
  elDiv.style.animation = buildAnimCSS(el);
  showToast('▶ Previewing: ' + el.animation);
}

function setPropertiesContent(html) {
  document.getElementById('propertiesContentDesktop').innerHTML = html;
  document.getElementById('propertiesContentMobile').innerHTML = html;
}

function showProperties(id) {
  const el = state.elements.find(e => e.id === id);
  if (!el) return;
  
  const animGrid = ANIMS.map(a => `
    <div class="anim-card ${el.animation === a.id ? 'selected' : ''}" onclick="updateProp('animation', '${a.id}')">
      <div class="anim-icon">${a.icon}</div>
      <div class="anim-name">${a.label}</div>
    </div>
  `).join('');
  
  let html = `
    <div class="props-section-hdr">📐 Transform</div>
    <div class="prop-group prop-row">
      <div><label class="prop-label">X</label><input type="number" class="prop-input" value="${Math.round(el.x)}" onchange="updateProp('x', parseInt(this.value))"></div>
      <div><label class="prop-label">Y</label><input type="number" class="prop-input" value="${Math.round(el.y)}" onchange="updateProp('y', parseInt(this.value))"></div>
    </div>
    <div class="prop-group prop-row">
      <div><label class="prop-label">Rotation °</label><input type="number" class="prop-input" value="${Math.round(el.rotation || 0)}" onchange="updateProp('rotation', parseInt(this.value))"></div>
      <div><label class="prop-label">Opacity %</label><input type="range" min="0" max="100" value="${el.opacity || 100}" oninput="updateProp('opacity', parseInt(this.value))"></div>
    </div>
  `;
  
  if (el.type === 'shape' && el.shapeType === 'rectangle') {
    html += `
      <div class="props-section-hdr">🔷 Shape</div>
      <div class="prop-group prop-row">
        <div><label class="prop-label">Width</label><input type="number" class="prop-input" value="${el.width}" onchange="updateProp('width', parseInt(this.value))"></div>
        <div><label class="prop-label">Height</label><input type="number" class="prop-input" value="${el.height}" onchange="updateProp('height', parseInt(this.value))"></div>
      </div>
      <div class="prop-group prop-row">
        <div><label class="prop-label">Border Radius</label><input type="number" class="prop-input" value="${el.borderRadius || 0}" onchange="updateProp('borderRadius', parseInt(this.value))"></div>
        <div><label class="prop-label">Color</label><input type="color" class="color-input" value="${el.color}" oninput="updateProp('color', this.value)"></div>
      </div>
    `;
  }
  
  if (el.type === 'shape' && el.shapeType === 'circle') {
    html += `
      <div class="props-section-hdr">⬤ Circle</div>
      <div class="prop-group prop-row">
        <div><label class="prop-label">Size</label><input type="number" class="prop-input" value="${el.size}" onchange="updateProp('size', parseInt(this.value))"></div>
        <div><label class="prop-label">Color</label><input type="color" class="color-input" value="${el.color}" oninput="updateProp('color', this.value)"></div>
      </div>
    `;
  }
  
  if (el.type === 'shape' && el.shapeType === 'line') {
    html += `
      <div class="props-section-hdr">━ Line</div>
      <div class="prop-group prop-row">
        <div><label class="prop-label">Length</label><input type="number" class="prop-input" value="${el.width}" onchange="updateProp('width', parseInt(this.value))"></div>
        <div><label class="prop-label">Thickness</label><input type="number" class="prop-input" value="${el.thickness}" onchange="updateProp('thickness', parseInt(this.value))"></div>
      </div>
      <div class="prop-group"><label class="prop-label">Color</label><input type="color" class="color-input" value="${el.color}" oninput="updateProp('color', this.value)"></div>
    `;
  }
  
  if (el.type === 'text') {
    html += `
      <div class="props-section-hdr">📝 Text</div>
      <div class="prop-group"><label class="prop-label">Content</label><textarea class="prop-input" rows="3" onchange="updateProp('content', this.value)">${el.content}</textarea></div>
      <div class="prop-group prop-row">
        <div><label class="prop-label">Font Size</label><input type="number" class="prop-input" value="${el.fontSize}" onchange="updateProp('fontSize', parseInt(this.value))"></div>
        <div><label class="prop-label">Color</label><input type="color" class="color-input" value="${el.color}" oninput="updateProp('color', this.value)"></div>
      </div>
      <div class="prop-group prop-row">
        <div><label class="prop-label">Weight</label><select class="prop-select" onchange="updateProp('fontWeight', this.value)"><option ${el.fontWeight === 'normal' ? 'selected' : ''}>normal</option><option ${el.fontWeight === 'bold' ? 'selected' : ''}>bold</option></select></div>
        <div><label class="prop-label">Align</label><select class="prop-select" onchange="updateProp('textAlign', this.value)"><option ${el.textAlign === 'left' ? 'selected' : ''}>left</option><option ${el.textAlign === 'center' ? 'selected' : ''}>center</option><option ${el.textAlign === 'right' ? 'selected' : ''}>right</option></select></div>
      </div>
      <div class="prop-group"><label class="prop-label">Shadow</label><select class="prop-select" onchange="updateProp('textShadow', this.value)"><option value="none" ${el.textShadow === 'none' ? 'selected' : ''}>None</option><option value="soft" ${el.textShadow === 'soft' ? 'selected' : ''}>Soft</option><option value="hard" ${el.textShadow === 'hard' ? 'selected' : ''}>Hard</option><option value="glow" ${el.textShadow === 'glow' ? 'selected' : ''}>Glow</option></select></div>
    `;
  }
  
  if (el.type === 'image') {
    html += `
      <div class="props-section-hdr">🖼️ Image</div>
      <div class="prop-group"><label class="prop-label">URL</label><input type="url" class="prop-input" value="${el.src}" onchange="updateProp('src', this.value)"></div>
      <div class="prop-group prop-row">
        <div><label class="prop-label">Width</label><input type="number" class="prop-input" value="${el.width}" onchange="updateProp('width', parseInt(this.value))"></div>
        <div><label class="prop-label">Border Radius</label><input type="number" class="prop-input" value="${el.borderRadius || 0}" onchange="updateProp('borderRadius', parseInt(this.value))"></div>
      </div>
    `;
  }
  
  if (el.type === 'social') {
    html += `
      <div class="props-section-hdr">💬 Social</div>
      <div class="prop-group"><label class="prop-label">Platform</label><select class="prop-select" onchange="updateProp('platform', this.value)"><option ${el.platform === 'youtube' ? 'selected' : ''}>youtube</option><option ${el.platform === 'twitch' ? 'selected' : ''}>twitch</option><option ${el.platform === 'tiktok' ? 'selected' : ''}>tiktok</option><option ${el.platform === 'instagram' ? 'selected' : ''}>instagram</option><option ${el.platform === 'twitter' ? 'selected' : ''}>twitter</option></select></div>
      <div class="prop-group"><label class="prop-label">Username</label><input type="text" class="prop-input" value="${el.username}" onchange="updateProp('username', this.value)"></div>
      <div class="prop-group"><label class="prop-label">Live Badge</label><select class="prop-select" onchange="updateProp('showLiveBadge', this.value === 'true')"><option value="true" ${el.showLiveBadge ? 'selected' : ''}>Show</option><option value="false" ${!el.showLiveBadge ? 'selected' : ''}>Hide</option></select></div>
    `;
  }
  
  html += `
    <div class="props-section-hdr">🎬 Animation</div>
    <div class="anim-grid">${animGrid}</div>
    <div class="prop-group prop-row">
      <div><label class="prop-label">Duration (s)</label><input type="number" class="prop-input" step="0.1" min="0.1" max="10" value="${el.animDuration || 0.6}" onchange="updateProp('animDuration', parseFloat(this.value))"></div>
      <div><label class="prop-label">Delay (s)</label><input type="number" class="prop-input" step="0.1" min="0" max="10" value="${el.animDelay || 0}" onchange="updateProp('animDelay', parseFloat(this.value))"></div>
    </div>
    <div class="prop-group"><label class="prop-label">Easing</label>
      <select class="prop-select" onchange="updateProp('animEasing', this.value)">
        <option ${el.animEasing === 'ease-out' ? 'selected' : ''}>ease-out</option>
        <option ${el.animEasing === 'ease-in' ? 'selected' : ''}>ease-in</option>
        <option ${el.animEasing === 'ease-in-out' ? 'selected' : ''}>ease-in-out</option>
        <option ${el.animEasing === 'linear' ? 'selected' : ''}>linear</option>
        <option value="cubic-bezier(0.34,1.56,0.64,1)" ${el.animEasing === 'cubic-bezier(0.34,1.56,0.64,1)' ? 'selected' : ''}>spring</option>
      </select>
    </div>
    <div class="prop-group">
      <button class="anim-preview-btn" onclick="previewAnimation(${el.id})">▶ Preview Animation</button>
    </div>
  `;
  
  setPropertiesContent(html);
}

window.updateProp = function(prop, val) {
  const el = state.elements.find(e => e.id === selectedId);
  if (el) {
    el[prop] = val;
    renderCanvas();
    if (prop === 'platform') showProperties(selectedId);
  }
};

function toggleDesktopPanel(side) {
  if (side === 'left') document.getElementById('leftPanel').classList.toggle('collapsed');
  else document.getElementById('rightPanel').classList.toggle('collapsed');
  setTimeout(scaleCanvas, 230);
}

function openDrawer(side) {
  document.getElementById(side === 'left' ? 'drawerLeft' : 'drawerRight').classList.add('open');
  document.getElementById('drawerBackdrop').classList.add('show');
  document.getElementById(side === 'left' ? 'mobLayersBtn' : 'mobPropsBtn').classList.add('active');
}

function closeDrawer(side) {
  document.getElementById(side === 'left' ? 'drawerLeft' : 'drawerRight').classList.remove('open');
  document.getElementById('drawerBackdrop').classList.remove('show');
  document.getElementById(side === 'left' ? 'mobLayersBtn' : 'mobPropsBtn').classList.remove('active');
}

function closeAllDrawers() { closeDrawer('left'); closeDrawer('right'); }
function toggleMobileDrawer(side) {
  const drawer = document.getElementById(side === 'left' ? 'drawerLeft' : 'drawerRight');
  drawer.classList.contains('open') ? closeDrawer(side) : openDrawer(side);
}

function openAddModal() { document.getElementById('addModal').classList.add('show'); }
function closeAddModal() { document.getElementById('addModal').classList.remove('show'); }

document.getElementById('addModal').addEventListener('click', e => { if (e.target === e.currentTarget) closeAddModal(); });

function saveDesign() {
  const name = document.getElementById('designName').value.trim();
  if (!name) { showToast('Enter a design name', 'error'); return; }
  const designData = { name: name, elements: state.elements, width: CANVAS_W, height: CANVAS_H };
  const blob = new Blob([JSON.stringify(designData, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = name.replace(/\s+/g, '-').toLowerCase() + '.overlay.json';
  a.click();
  showToast('Exported: ' + name + '.overlay.json');
}

function showToast(msg, type = 'success') {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.className = 'toast ' + (type === 'error' ? 'error' : '');
  toast.style.display = 'block';
  clearTimeout(toast._timer);
  toast._timer = setTimeout(() => toast.style.display = 'none', 2600);
}

document.getElementById('canvas').addEventListener('mousedown', e => {
  if (e.target === e.currentTarget || e.target.classList.contains('canvas-layer')) {
    selectedId = null;
    hideTransform();
    renderLists();
    setPropertiesContent('<div class="empty-state" style="padding:20px 12px">Select an element</div>');
  }
});

renderCanvas();
showToast('Welcome! Click "+ Add" to begin');
</script>
</body>
</html>
