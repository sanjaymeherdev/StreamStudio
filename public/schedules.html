<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schedule Manager - StreamStudio</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #1a1a2e; color: #eee; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; padding-bottom: 20px; border-bottom: 1px solid #0f3460; }
        header h1 { font-size: 28px; }
        .back-link { color: #e94560; text-decoration: none; font-size: 14px; }
        .back-link:hover { text-decoration: underline; }
        .controls { display: flex; gap: 12px; margin-bottom: 20px; }
        .btn { padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; transition: background 0.2s; }
        .btn-primary { background: #e94560; color: white; }
        .btn-primary:hover { background: #ff6b6b; }
        .btn-secondary { background: #0f3460; color: #eee; }
        .btn-secondary:hover { background: #16213e; }
        .btn-danger { background: #dc3545; color: white; }
        .btn-danger:hover { background: #c82333; }
        .table-container { background: #16213e; border-radius: 12px; overflow: hidden; border: 1px solid #0f3460; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 14px 16px; text-align: left; border-bottom: 1px solid #0f3460; }
        th { background: #0f3460; font-weight: 600; font-size: 13px; text-transform: uppercase; letter-spacing: 0.5px; }
        tr:hover { background: #1a2744; }
        .status-badge { display: inline-block; padding: 4px 10px; border-radius: 12px; font-size: 11px; font-weight: 600; }
        .status-active { background: #00b894; color: #000; }
        .status-inactive { background: #636e72; color: #fff; }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1000; justify-content: center; align-items: center; }
        .modal-overlay.open { display: flex; }
        .modal { background: #16213e; border-radius: 12px; padding: 30px; width: 90%; max-width: 600px; max-height: 90vh; overflow-y: auto; border: 1px solid #0f3460; }
        .modal h2 { margin-bottom: 20px; color: #e94560; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; margin-bottom: 6px; font-size: 13px; color: #aaa; }
        .form-group input, .form-group select { width: 100%; padding: 10px; border: 1px solid #0f3460; border-radius: 6px; background: #1a1a2e; color: #eee; font-size: 14px; }
        .form-group input:focus, .form-group select:focus { outline: none; border-color: #e94560; }
        .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
        .empty-state { text-align: center; padding: 60px 20px; color: #666; }
        .empty-state h3 { margin-bottom: 10px; color: #888; }
        .refresh-indicator { font-size: 12px; color: #666; margin-left: 10px; }
        .realtime-dot { display: inline-block; width: 8px; height: 8px; background: #00b894; border-radius: 50%; margin-right: 6px; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📅 Schedule Manager</h1>
            <div>
                <span class="realtime-dot"></span>
                <span id="realtimeStatus">Realtime Active</span>
                <span class="refresh-indicator" id="lastRefresh"></span>
                <a href="/index.html" class="back-link" style="margin-left: 20px;">← Back to Admin</a>
            </div>
        </header>

        <div class="controls">
            <button class="btn btn-primary" onclick="openModal()">+ New Schedule</button>
            <button class="btn btn-secondary" onclick="loadSchedules()">🔄 Refresh</button>
            <button class="btn btn-secondary" onclick="triggerNow()">⚡ Trigger Test</button>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>ID</th><th>Template</th><th>Device</th><th>Start Time</th>
                        <th>End Time</th><th>Repeat</th><th>Duration</th><th>Status</th><th>Actions</th>
                    </tr>
                </thead>
                <tbody id="scheduleTableBody">
                    <tr><td colspan="9" class="empty-state"><h3>Loading schedules...</h3></td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Modal -->
    <div class="modal-overlay" id="scheduleModal" onclick="if(event.target===this) closeModal()">
        <div class="modal">
            <h2 id="modalTitle">New Schedule</h2>
            <form id="scheduleForm" onsubmit="saveSchedule(event)">
                <input type="hidden" id="scheduleId">
                <div class="form-group">
                    <label>Template</label>
                    <select id="templateSelect" required>
                        <option value="">Select a template...</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Device ID</label>
                    <input type="text" id="deviceId" value="phone1" placeholder="e.g., phone1">
                </div>
                <div class="form-group">
                    <label>Start DateTime</label>
                    <input type="datetime-local" id="startDatetime" required>
                </div>
                <div class="form-group">
                    <label>End DateTime (optional)</label>
                    <input type="datetime-local" id="endDatetime">
                </div>
                <div class="form-group">
                    <label>Duration (seconds)</label>
                    <input type="number" id="durationSeconds" value="10" min="1" max="300">
                </div>
                <div class="form-group">
                    <label>Repeat Interval (seconds, 0 = no repeat)</label>
                    <input type="number" id="repeatInterval" value="0" min="0">
                </div>
                <div class="form-group">
                    <label>Repeat Quantity</label>
                    <input type="number" id="repeatQty" value="1" min="1">
                </div>
                <div class="form-group">
                    <label>Loop Count</label>
                    <input type="number" id="loopCount" value="1" min="1">
                </div>
                <div class="form-group">
                    <label>Active</label>
                    <select id="isActive">
                        <option value="true">Yes</option>
                        <option value="false">No</option>
                    </select>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-secondary" onclick="closeModal()">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save Schedule</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Load Supabase FIRST, then our script -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // Use a different variable name to avoid colliding with window.supabase exposed by the CDN
        var SUPABASE_URL  = 'https://yfjzvpzgecbnfysacbjq.supabase.co';
        var SUPABASE_KEY  = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inlmanp2cHpnZWNibmZ5c2FjYmpxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njc5OTY2MzcsImV4cCI6MjA4MzU3MjYzN30.v27rjgUTGuHAq6sAjhjQYWb-Y9O23f5FpwXQBFZyjmQ';
        var sbClient      = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        var schedules = [];
        var templates = [];

        /* ── Modal ───────────────────────────────────────────── */
        function openModal() {
            document.getElementById('modalTitle').textContent = 'New Schedule';
            document.getElementById('scheduleForm').reset();
            document.getElementById('scheduleId').value  = '';
            document.getElementById('deviceId').value    = 'phone1';
            document.getElementById('isActive').value    = 'true';
            document.getElementById('scheduleModal').classList.add('open');
        }

        function closeModal() {
            document.getElementById('scheduleModal').classList.remove('open');
        }

        /* ── Templates ───────────────────────────────────────── */
        function loadTemplates() {
            fetch('/api/templates')
                .then(function(r) { return r.json(); })
                .then(function(data) {
                    templates = data;
                    var sel = document.getElementById('templateSelect');
                    sel.innerHTML = '<option value="">Select a template...</option>';
                    templates.forEach(function(t) {
                        var o = document.createElement('option');
                        o.value = t.id;
                        o.textContent = t.name;
                        sel.appendChild(o);
                    });
                })
                .catch(function(err) { console.error('Templates error:', err); });
        }

        /* ── Schedules ───────────────────────────────────────── */
        function loadSchedules() {
            fetch('/api/schedules')
                .then(function(r) { return r.json(); })
                .then(function(data) {
                    schedules = data;
                    renderTable();
                    document.getElementById('lastRefresh').textContent = 'Last: ' + new Date().toLocaleTimeString();
                })
                .catch(function(err) {
                    console.error('Schedules error:', err);
                    document.getElementById('scheduleTableBody').innerHTML =
                        '<tr><td colspan="9" class="empty-state"><h3>Error loading schedules</h3><p>' + err.message + '</p></td></tr>';
                });
        }

        function renderTable() {
            var tbody = document.getElementById('scheduleTableBody');
            if (!schedules.length) {
                tbody.innerHTML = '<tr><td colspan="9" class="empty-state"><h3>No schedules yet</h3><p>Click "+ New Schedule" to get started</p></td></tr>';
                return;
            }
            var rows = '';
            for (var i = 0; i < schedules.length; i++) {
                var s = schedules[i];
                var tmpl = templates.filter(function(t) { return t.id === s.template_id; })[0];
                var tName  = tmpl ? tmpl.name : 'Unknown';
                var sCls   = s.is_active ? 'status-active' : 'status-inactive';
                var sTxt   = s.is_active ? 'Active' : 'Inactive';
                var repeat = s.repeat_interval_seconds > 0
                    ? 'Every ' + s.repeat_interval_seconds + 's &times; ' + s.repeat_qty
                    : 'Once';
                var endTd = s.end_datetime ? new Date(s.end_datetime).toLocaleString() : '-';
                rows += '<tr>' +
                    '<td><code>' + s.id + '</code></td>' +
                    '<td>' + tName + '</td>' +
                    '<td>' + (s.device_id || 'phone1') + '</td>' +
                    '<td>' + new Date(s.start_datetime).toLocaleString() + '</td>' +
                    '<td>' + endTd + '</td>' +
                    '<td>' + repeat + '</td>' +
                    '<td>' + s.duration_seconds + 's</td>' +
                    '<td><span class="status-badge ' + sCls + '">' + sTxt + '</span></td>' +
                    '<td>' +
                        '<button class="btn btn-secondary" style="padding:4px 8px;font-size:12px;margin-right:4px" onclick="editSchedule(\'' + s.id + '\')">Edit</button>' +
                        '<button class="btn btn-danger"    style="padding:4px 8px;font-size:12px"              onclick="deleteSchedule(\'' + s.id + '\')">Delete</button>' +
                    '</td></tr>';
            }
            tbody.innerHTML = rows;
        }

        function editSchedule(id) {
            var s = schedules.filter(function(x) { return x.id === id; })[0];
            if (!s) return;
            document.getElementById('modalTitle').textContent    = 'Edit Schedule';
            document.getElementById('scheduleId').value          = s.id;
            document.getElementById('templateSelect').value      = s.template_id;
            document.getElementById('deviceId').value            = s.device_id || 'phone1';
            document.getElementById('startDatetime').value       = new Date(s.start_datetime).toISOString().slice(0, 16);
            document.getElementById('endDatetime').value         = s.end_datetime ? new Date(s.end_datetime).toISOString().slice(0, 16) : '';
            document.getElementById('durationSeconds').value     = s.duration_seconds || 10;
            document.getElementById('repeatInterval').value      = s.repeat_interval_seconds || 0;
            document.getElementById('repeatQty').value           = s.repeat_qty || 1;
            document.getElementById('loopCount').value           = s.loop_count || 1;
            document.getElementById('isActive').value            = String(s.is_active);
            document.getElementById('scheduleModal').classList.add('open');
        }

        function deleteSchedule(id) {
            if (!confirm('Delete this schedule?')) return;
            fetch('/api/schedule/' + id, { method: 'DELETE' })
                .then(function(r) { if (!r.ok) throw new Error('Delete failed'); loadSchedules(); })
                .catch(function(err) { alert('Error: ' + err.message); });
        }

        function saveSchedule(e) {
            e.preventDefault();
            var id   = document.getElementById('scheduleId').value;
            var data = {
                template_id:             document.getElementById('templateSelect').value,
                device_id:               document.getElementById('deviceId').value,
                start_datetime:          new Date(document.getElementById('startDatetime').value).toISOString(),
                end_datetime:            document.getElementById('endDatetime').value
                                             ? new Date(document.getElementById('endDatetime').value).toISOString()
                                             : null,
                duration_seconds:        parseInt(document.getElementById('durationSeconds').value),
                repeat_interval_seconds: parseInt(document.getElementById('repeatInterval').value),
                repeat_qty:              parseInt(document.getElementById('repeatQty').value),
                loop_count:              parseInt(document.getElementById('loopCount').value),
                is_active:               document.getElementById('isActive').value === 'true'
            };
            var url    = id ? '/api/schedule/' + id : '/api/schedules';
            var method = id ? 'PUT' : 'POST';
            fetch(url, { method: method, headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) })
                .then(function(r) { if (!r.ok) throw new Error('Save failed'); closeModal(); loadSchedules(); })
                .catch(function(err) { alert('Error saving: ' + err.message); });
        }

        function triggerNow() {
            var templateId = prompt('Enter template ID to trigger now:');
            if (!templateId) return;
            fetch('/api/trigger-now', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ template_id: templateId, device_id: 'phone1', duration_seconds: 10 })
            })
            .then(function(r) { return r.json(); })
            .then(function(res) {
                if (res.success) alert('Triggered! "' + res.template + '" will show for 10s');
                else alert('Error: ' + (res.error || 'Unknown'));
            })
            .catch(function(err) { alert('Error: ' + err.message); });
        }

        /* ── Realtime ─────────────────────────────────────────── */
        sbClient
            .channel('schedules-changes')
            .on('postgres_changes', { event: '*', schema: 'public', table: 'schedules' }, function() {
                loadSchedules();
            })
            .subscribe();

        /* ── Init ─────────────────────────────────────────────── */
        loadTemplates();
        loadSchedules();
        setInterval(loadSchedules, 30000);
    </script>
</body>
</html>
